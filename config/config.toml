# ZeroTrust Mesh Configuration
# Default configuration file (TOML format)

[general]
autostart = false
theme = "dark"
notifications_enabled = true
inactivity_lock_minutes = 15

[identity]
trust_domain = "zerotrust.local"
jwt_expiration_seconds = 900  # 15 minutes
ca_key_path = "/var/lib/zerotrust-mesh/ca.key"
ca_cert_path = "/var/lib/zerotrust-mesh/ca.crt"
certs_path = "/var/lib/zerotrust-mesh/certs"

[policy]
cache_ttl_seconds = 5
max_cache_entries = 10000
default_action = "Deny"  # Zero-trust: deny by default

[wireguard]
listen_port = 51820
virtual_subnet = "10.128.0.0/16"
keepalive_seconds = 25
key_rotation_days = 7
mtu = 1420

[ebpf]
enabled = true
interface = "eth0"
syn_flood_threshold = 100    # SYNs/sec per IP
port_scan_threshold = 50     # ports in 10 seconds
http_flood_threshold = 1000  # requests/sec
icmp_flood_threshold = 500   # pings/sec
drop_log_sample_rate = 0.1   # Log 10% of dropped packets

[attestation]
tpm_enabled = true
recalculation_interval_seconds = 30

# Trust score weights (must sum to 1.0)
tpm_weight = 0.40
process_integrity_weight = 0.25
behavioral_weight = 0.20
resource_weight = 0.15

# Trust level thresholds
full_access_threshold = 0.8
limited_access_threshold = 0.5
isolation_threshold = 0.3
termination_threshold = 0.3

[storage]
database_path = "/var/lib/zerotrust-mesh/zerotrust.db"
log_retention_days = 90
max_alerts = 1000000

[logging]
level = "info"  # debug, info, warn, error
file_enabled = true
file_path = "/var/log/zerotrust-mesh/app.log"
max_file_size_mb = 100

[network]
api_port = 8080
websocket_port = 8081
discovery_interval_seconds = 5
dns_resolver = "1.1.1.1"
